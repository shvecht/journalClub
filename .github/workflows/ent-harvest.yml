name: ENT harvest (stage 1–2)

on:
  workflow_dispatch:
    inputs:
      target_month:
        description: "Target month to harvest in YYYY-MM format"
        required: false
        type: string
      year:
        description: "Target calendar year (e.g., 2024)"
        required: false
        type: string
      month:
        description: "Target calendar month number (1-12)"
        required: false
        type: string
  schedule:
    - cron: "00 6 1 * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  run-harvest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine target month directory
        id: target
        run: |
          if [ -n "${{ github.event.inputs.target_month }}" ]; then
            OUT_DIR=$(echo "${{ github.event.inputs.target_month }}" | sed 's/-/\//')
          elif [ -n "${{ github.event.inputs.year }}" ] && [ -n "${{ github.event.inputs.month }}" ]; then
            OUT_DIR=$(printf "%s/%02d" "${{ github.event.inputs.year }}" "${{ github.event.inputs.month }}")
          else
            OUT_DIR=$(date -u -d '1 month ago' +'%Y/%m')
          fi

          echo "OUT_DIR=$OUT_DIR" >> "$GITHUB_ENV"
          echo "branch=ent-harvest/$OUT_DIR" >> "$GITHUB_OUTPUT"
          echo "target_month=$(echo "$OUT_DIR" | sed 's#/#-#')" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install papermill nbconvert requests pandas python-dateutil tenacity tqdm ipykernel

      - name: Install Python kernel
        run: python -m ipykernel install --user

      - name: Run articlesRetrieval notebook
        env:
          UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}
          TARGET_MONTH: ${{ steps.target.outputs.target_month }}
        run: |
          papermill articlesRetrieval.ipynb articlesRetrieval.out.ipynb \
            -p TARGET_MONTH "${TARGET_MONTH}" \
            -p TARGET_YEAR "" \
            -p TARGET_MONTH_NUMBER ""

      - name: Organize outputs by month
        run: |
          SOURCE_DIR="data/ent_search"
          mkdir -p "$OUT_DIR"

          shopt -s nullglob
          move_if_exists() {
            for file in "$@"; do
              if [ -f "$file" ]; then
                mv "$file" "$OUT_DIR/"
              fi
            done
          }

          move_if_exists \
            "$SOURCE_DIR"/ent_raw_results_*.csv \
            "$SOURCE_DIR"/ent_all_results.json \
            "$SOURCE_DIR"/ent_failed_pmids.json \
            "$SOURCE_DIR"/ent_curated.csv \
            "$SOURCE_DIR"/ent_report.md
          move_if_exists articlesRetrieval.out.ipynb
          shopt -u nullglob

      - name: Verify harvest data exists
        id: harvest-check
        run: |
          if [ -f "$OUT_DIR/ent_all_results.json" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::notice::No ent_all_results.json found in $OUT_DIR; skipping downstream rebuild and PR creation."
          echo "found=false" >> "$GITHUB_OUTPUT"

      - name: Run populate_sessions.py and rebuild data
        if: steps.harvest-check.outputs.found == 'true'
        run: |
          python populate_sessions.py
          python build_journal_club.py

      - name: Select token for pull requests
        id: select-token
        env:
          ENT_HARVEST_TOKEN: ${{ secrets.ENT_HARVEST_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$ENT_HARVEST_TOKEN" ]; then
            echo "token=$ENT_HARVEST_TOKEN" >> "$GITHUB_OUTPUT"
          else
            echo "token=$GITHUB_TOKEN" >> "$GITHUB_OUTPUT"
            echo "::notice::ENT_HARVEST_TOKEN not provided; using GITHUB_TOKEN."
          fi

      - name: Close stale harvest PR when no data was produced
        if: steps.harvest-check.outputs.found != 'true'
        env:
          GITHUB_TOKEN: ${{ steps.select-token.outputs.token }}
          REPOSITORY: ${{ github.repository }}
          TARGET_BRANCH: ${{ steps.target.outputs.branch }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPOSITORY"]
          branch = os.environ["TARGET_BRANCH"]
          owner = repo.split("/", 1)[0]
          head = urllib.parse.quote(f"{owner}:{branch}", safe="")
          url = f"https://api.github.com/repos/{repo}/pulls?state=open&head={head}"

          request = urllib.request.Request(
              url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
              },
          )
          with urllib.request.urlopen(request) as response:
              pulls = json.load(response)

          for pull in pulls:
              patch = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/pulls/{pull['number']}",
                  data=json.dumps({"state": "closed"}).encode("utf-8"),
                  method="PATCH",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(patch):
                  pass
              print(f"Closed stale PR #{pull['number']} for {branch}")
          PY

      - name: Create or update ENT harvest pull request
        if: steps.harvest-check.outputs.found == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.select-token.outputs.token }}
          branch: ${{ steps.target.outputs.branch }}
          base: main
          commit-message: "ENT harvest: ${{ env.OUT_DIR }}"
          title: "ENT harvest: ${{ env.OUT_DIR }}"
          body: |
            Monthly ENT harvest outputs for ${{ env.OUT_DIR }}, including rebuilt downstream data.
          add-paths: |
            ${{ env.OUT_DIR }}/
            sessions.csv
            data/journal_club.json

      - name: Upload artifacts
        if: steps.harvest-check.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ent-harvest-${{ github.run_id }}
          path: |
            ${{ env.OUT_DIR }}/ent_raw_results*.csv
            ${{ env.OUT_DIR }}/ent_all_results.json
            ${{ env.OUT_DIR }}/ent_failed_pmids.json
            ${{ env.OUT_DIR }}/ent_curated.csv
            ${{ env.OUT_DIR }}/ent_report.md
            ${{ env.OUT_DIR }}/articlesRetrieval.out.ipynb
          if-no-files-found: ignore
