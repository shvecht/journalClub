name: Rebuild journal club data

on:
  push:
    branches:
      - main
    paths:
      - sessions.csv
      - build_journal_club.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-data:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate data/journal_club.json
        run: |
          python build_journal_club.py

      - name: Commit and push updated site data
        run: |
          if git diff --quiet -- data/journal_club.json; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/journal_club.json
          git commit -m "chore: rebuild journal club data"
          git push
