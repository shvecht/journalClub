name: Rebuild journal club data

on:
  push:
    branches:
      - main
    paths:
      - sessions.csv
      - populate_sessions.py
      - build_journal_club.py
      - '.github/workflows/build-journal-data.yml'
      - '20[0-9][0-9]/**/ent_all_results.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-data:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild sessions and site data
        run: |
          python populate_sessions.py
          python build_journal_club.py

      - name: Commit and push updated site data
        run: |
          if git diff --quiet -- sessions.csv data/journal_club.json; then
            echo "No downstream data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add sessions.csv data/journal_club.json
          git commit -m "chore: rebuild journal club data"
          git push
